<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Botanica | Flower & Botanical Login</title>
    <link rel="icon" type="img/jpg" href="img/growwpark-logo.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="tailwind.js"></script>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ec4899'%3E%3Cpath d='M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M11,7V13L16,16L17.5,13.5L13.5,11.5V7H11Z' fill='%23ec4899'/%3E%3C/svg%3E">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#ec4899',
                        primaryDark: '#be185d',
                        secondary: '#6F8F5E',
                        cream: '#FEF9F0',
                        deepgreen: '#2C4230',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Cormorant Garamond', 'serif'],
                    },
                    borderRadius: {
                        '4xl': '2rem',
                        '5xl': '2.5rem',
                    }
                }
            }
        }
    </script>

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, direction 0.2s;
        }
        .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }
        .neu-input {
            transition: all 0.2s ease;
        }
        .neu-input:focus {
            transform: scale(0.99);
        }
        .checkbox-botanica:checked {
            background-color: #6F8F5E;
            border-color: #6F8F5E;
        }
        @keyframes floatLeaf {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.25; }
            50% { transform: translateY(-12px) rotate(5deg); opacity: 0.5; }
            100% { transform: translateY(0px) rotate(0deg); opacity: 0.25; }
        }
        .floating-botanical {
            animation: floatLeaf 6s infinite ease-in-out;
        }
        .delay-200 { animation-delay: 2s; }
        .delay-500 { animation-delay: 3.5s; }
        
        /* prevent body scroll when modal would appear, but fine for whole page */
        body {
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        /* ensure card never overflows */
        .max-w-md {
            max-width: 28rem;
        }
        /* responsive touch friendly */
        @media (max-width: 480px) {
            .rounded-5xl {
                border-radius: 1.75rem;
            }
            button, input {
                font-size: 16px; /* prevent zoom on ios */
            }
        }
    </style>
</head>

<body class="antialiased bg-[#fef8f4] dark:bg-black transition-colors duration-500 relative min-h-screen overflow-x-hidden text-[#1f1015] dark:text-white">

    <!-- Botanical background decorative elements (no scroll interference) -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute top-20 left-5 text-7xl opacity-15 dark:opacity-10 floating-botanical">🌿</div>
        <div class="absolute bottom-32 right-8 text-8xl opacity-15 dark:opacity-10 floating-botanical delay-200">🌸</div>
        <div class="absolute top-1/3 right-1/4 text-6xl opacity-10 dark:opacity-8 floating-botanical delay-500">🍃</div>
        <div class="absolute bottom-10 left-[15%] text-7xl opacity-10 dark:opacity-5 floating-botanical">🌼</div>
        <div class="absolute top-2/3 left-5 text-5xl opacity-10 floating-botanical delay-200">🌻</div>
        <div class="absolute inset-0 bg-gradient-to-br from-cream/50 via-transparent to-cream/30"></div>
    </div>

    <!-- top controls: theme + rtl (botanical friendly) - always accessible -->
    <div class="fixed top-5 right-5 z-50 flex items-center gap-3">
        <button id="rtlToggle" class="w-10 h-10 rounded-2xl bg-white/80 backdrop-blur-md shadow-sm border border-secondary/30 flex items-center justify-center text-secondary hover:text-primary hover:border-primary transition-all duration-200" title="RTL / LTR">
            <i class="fas fa-right-left text-sm"></i>
        </button>
        <button id="themeToggle" class="w-10 h-10 rounded-2xl bg-white/80 backdrop-blur-md shadow-sm border border-secondary/30 flex items-center justify-center text-secondary hover:text-primary hover:border-primary transition-all duration-200" title="Dark / Light">
            <i id="themeIcon" class="fas fa-moon text-sm"></i>
        </button>
    </div>

    <!-- main card: flower & botanical login experience - fully responsive no scroll lock -->
    <div class="relative z-10 min-h-screen w-full flex items-center justify-center px-4 py-20">
        <div class="w-full max-w-md bg-white dark:bg-gray-900 backdrop-blur-sm rounded-5xl shadow-2xl border border-secondary/15 dark:border-white/10 p-6 sm:p-9 transition-colors duration-300">
            
            <!-- brand & flower + botanical header -->
            <div class="flex flex-col items-center mb-6">
                <a href="index.html" class="flex items-center gap-[9px] hover:scale-[1.04] transition-all duration-300 hover:drop-shadow-[0_4px_10px_rgba(236,72,153,0.3)]">
                    <div class="w-[34px] h-[34px] rounded-full bg-gradient-to-br from-[#ec4899] to-[#be185d] text-white text-[14px] flex items-center justify-center shadow-[0_4px_12px_rgba(236,72,153,0.4)] flex-shrink-0">
                        <i class="fas fa-seedling"></i>
                    </div>
                    <div class="flex items-baseline gap-[5px] leading-none">
                        <span class="font-serif text-[20px] font-semibold text-gray-900 dark:text-white tracking-[-0.01em]">Flower</span>
                        <span class="font-serif text-[19px] font-normal italic text-[#ec4899]">&amp; Botanical</span>
                    </div>
                </a>
                <p class="text-xs text-secondary/80 dark:text-gray-400 mt-4 font-medium tracking-wide">preserve · bloom · nurture</p>
            </div>

            <!-- login form -->
            <form id="loginForm" class="space-y-5">
                <!-- email field -->
                <div>
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-secondary dark:text-gray-300 mb-1.5 ml-1">
                        <i class="fas fa-envelope mr-1 text-xs"></i> Email address
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-feather-alt text-primary/60 text-sm"></i>
                        </div>
                        <input type="email" id="email" required placeholder="nature@botanica.com" 
                            class="w-full pl-11 pr-4 py-3.5 bg-cream/80 dark:bg-gray-800 dark:text-gray-100 dark:placeholder-gray-500 border border-secondary/30 dark:border-white/10 rounded-2xl focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-deepgreen shadow-inner text-sm neu-input placeholder-secondary/50">
                    </div>
                </div>

                <!-- password field -->
                <div>
                    <div class="flex justify-between mb-1.5 px-1">
                        <label class="text-[11px] font-bold uppercase tracking-wider text-secondary dark:text-gray-300">
                            <i class="fas fa-lock mr-1 text-xs"></i> Password
                        </label>
                        <a href="#" id="forgotPwdLink" class="text-[10px] font-semibold text-primary hover:text-secondary transition-colors">Forgot  Password</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-leaf text-primary/60 text-sm"></i>
                        </div>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full pl-11 pr-12 py-3.5 bg-cream/80 dark:bg-gray-800 dark:text-gray-100 border border-secondary/30 dark:border-white/10 rounded-2xl focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-deepgreen shadow-inner text-sm">
                        <button type="button" id="togglePasswordBtn" class="absolute inset-y-0 right-0 pr-4 flex items-center text-secondary/60 hover:text-primary transition-colors">
                            <i id="eyeIcon" class="fas fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <!-- remember me row -->
                <div class="flex items-center justify-between pt-1">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" id="rememberCheck" class="checkbox-botanica w-3.5 h-3.5 rounded border-secondary/40 text-secondary focus:ring-primary/30 bg-cream">
                        <span class="text-xs font-medium text-[#5a3a45] dark:text-gray-400 group-hover:text-primary transition-colors">Remember me</span>
                    </label>
                </div>

                <!-- login button -->
                <button type="submit" class="w-full mt-3 py-3.5 bg-primary hover:bg-primaryDark text-white rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-primary/20 transition-all duration-300 flex items-center justify-center gap-2 group">
                    <i class="fas fa-flower"></i> login 
                    <i class="fas fa-arrow-right text-xs group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>

            <!-- elegant divider -->
            <div class="relative my-7">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-secondary/20"></div>
                </div>
                <div class="relative flex justify-center text-xs">
                    <span class="px-3 bg-white dark:bg-gray-900 text-secondary/60 dark:text-gray-500 font-bold uppercase tracking-widest text-[9px]"><i class="fas fa-spa mr-1"></i> blossom connections</span>
                </div>
            </div>

            <!-- social sign in: Google + Facebook (Instagram removed) -->
        <div class="flex items-center justify-center gap-4 max-w-xs mx-auto">
    <!-- Google Button -->
    <button class="social-login-btn flex items-center justify-center w-11 h-11 bg-cream/80 dark:bg-gray-800 border border-secondary/20 dark:border-white/10 rounded-xl hover:border-primary/50 hover:shadow-md transition-all text-deepgreen">
        <i class="fab fa-google text-primary text-lg"></i>
    </button>
    
    <!-- Facebook Button -->
    <button class="social-login-btn flex items-center justify-center w-11 h-11 bg-cream/80 dark:bg-gray-800 border border-secondary/20 dark:border-white/10 rounded-xl hover:border-primary/50 hover:shadow-md transition-all text-deepgreen">
        <i class="fab fa-facebook-f text-primary text-lg"></i>
    </button>

    <!-- Apple Button -->
    <button class="social-login-btn flex items-center justify-center w-11 h-11 bg-cream/80 dark:bg-gray-800 border border-secondary/20 dark:border-white/10 rounded-xl hover:border-primary/50 hover:shadow-md transition-all text-deepgreen">
        <i class="fab fa-apple text-primary text-lg"></i>
    </button>
</div>

            <!-- create account link -->
            <p class="mt-7 text-center text-xs text-[#5a3a45] dark:text-gray-400">
                New to the botanical collective? 
                <a href="#" id="createAccountLink" class="font-bold text-secondary hover:text-primary border-b border-secondary/40 hover:border-primary transition-all pb-0.5 ml-1"> create account </a>
            </p>
            <p class="text-center text-[10px] text-secondary/50 dark:text-gray-600 mt-4 italic">preserve memories, press flowers, bloom together</p>
        </div>
    </div>

    <script>
        // ---------- DOM elements ----------
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginForm = document.getElementById('loginForm');
        const togglePwdBtn = document.getElementById('togglePasswordBtn');
        const eyeIcon = document.getElementById('eyeIcon');
        const rememberCheckbox = document.getElementById('rememberCheck');
        const forgotLink = document.getElementById('forgotPwdLink');
        const createAccountLink = document.getElementById('createAccountLink');
        const socialBtns = document.querySelectorAll('.social-login-btn');

        // 1. Password toggle visibility
        if (togglePwdBtn) {
            togglePwdBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                if (type === 'text') {
                    eyeIcon.classList.remove('fa-eye');
                    eyeIcon.classList.add('fa-eye-slash');
                } else {
                    eyeIcon.classList.remove('fa-eye-slash');
                    eyeIcon.classList.add('fa-eye');
                }
            });
        }

        // 2. Load remembered email if any (flower memory)
        function loadRemembered() {
            const rem = localStorage.getItem('botanical_remember');
            if (rem === 'true') {
                const savedEmail = localStorage.getItem('botanical_email');
                if (savedEmail && emailInput) {
                    emailInput.value = savedEmail;
                }
                if (rememberCheckbox) rememberCheckbox.checked = true;
            } else {
                if (rememberCheckbox) rememberCheckbox.checked = false;
            }
        }
        loadRemembered();

        // 3. Login submit: botanical validation + store remember
        if (loginForm) {
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = emailInput ? emailInput.value.trim() : '';
                const password = passwordInput ? passwordInput.value : '';

                if (!email) {
                    alert("🌸 Please enter your email to enter the botanical garden.");
                    emailInput.focus();
                    return;
                }
                if (!password) {
                    alert("🌿 Kindly enter your password to preserve your blooms.");
                    passwordInput.focus();
                    return;
                }
                if (!email.includes('@') || !email.includes('.')) {
                    alert("📧 Please provide a valid email (like flora@botanica.com).");
                    return;
                }

                // handle remember me
                if (rememberCheckbox && rememberCheckbox.checked) {
                    localStorage.setItem('botanical_email', email);
                    localStorage.setItem('botanical_remember', 'true');
                } else {
                    localStorage.removeItem('botanical_email');
                    localStorage.setItem('botanical_remember', 'false');
                }

                const submitBtn = loginForm.querySelector('button[type="submit"]');
                const originalHtml = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> opening greenhouse...';
                submitBtn.disabled = true;
                setTimeout(() => {
                    alert(`✨ Welcome back, ${email}! ✨\nYour pressed flower journey continues.`);
                    window.location.href = 'user.html';
                }, 1000);
            });
        }

        // 4. Forgot password simulation
        if (forgotLink) {
            forgotLink.addEventListener('click', (e) => {
                e.preventDefault();
                const emailHint = emailInput && emailInput.value.trim() ? emailInput.value.trim() : 'your botanical email';
                alert(`🌱 A floral reset link has been sent to ${emailHint}\n(Check your inbox for preservation magic)`);
            });
        }

        // 5. CREATE ACCOUNT link: redirect to signup.html
        if (createAccountLink) {
            createAccountLink.addEventListener('click', (e) => {
                e.preventDefault();
                createAccountLink.style.transform = 'scale(0.97)';
                setTimeout(() => { if(createAccountLink) createAccountLink.style.transform = ''; }, 150);
                window.location.href = 'signup.html';
            });
        }

        // 6. Social login simulation (Google & Facebook)
        socialBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                let provider = 'social';
                if (btn.innerText.includes('Google')) provider = 'Google';
                else if (btn.innerText.includes('Facebook')) provider = 'Facebook';
                alert(`🌼 ${provider} authentication will bloom soon.\nStay connected with the botanical network.`);
            });
        });

        // ---------- DARK MODE + RTL (complete, no scroll lock) ----------
        const htmlElement = document.documentElement;
        const themeBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        function applyTheme() {
            const isDark = localStorage.getItem('botanical_theme') === 'dark';
            if (isDark) {
                htmlElement.classList.add('dark');
                if (themeIcon) themeIcon.className = 'fas fa-sun text-yellow-400';
            } else {
                htmlElement.classList.remove('dark');
                if (themeIcon) themeIcon.className = 'fas fa-moon';
            }
        }

        function toggleThemeMode() {
            const isDark = htmlElement.classList.toggle('dark');
            localStorage.setItem('botanical_theme', isDark ? 'dark' : 'light');
            applyTheme();
        }

        if (themeBtn) themeBtn.addEventListener('click', toggleThemeMode);
        
        const savedTheme = localStorage.getItem('botanical_theme');
        if (savedTheme === 'dark') {
            htmlElement.classList.add('dark');
        } else if (savedTheme === 'light') {
            htmlElement.classList.remove('dark');
        } else {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                htmlElement.classList.add('dark');
                localStorage.setItem('botanical_theme', 'dark');
            } else {
                htmlElement.classList.remove('dark');
                localStorage.setItem('botanical_theme', 'light');
            }
        }
        applyTheme();

        // RTL toggle with full direction support
        const rtlToggleBtn = document.getElementById('rtlToggle');
        function setRTL(isRTL) {
            if (isRTL) {
                htmlElement.setAttribute('dir', 'rtl');
                localStorage.setItem('botanical_dir', 'rtl');
                // adjust icon positions if needed but general classes handle
            } else {
                htmlElement.setAttribute('dir', 'ltr');
                localStorage.setItem('botanical_dir', 'ltr');
            }
        }
        function toggleRTL() {
            const currentDir = htmlElement.getAttribute('dir');
            const newDir = currentDir === 'rtl' ? 'ltr' : 'rtl';
            setRTL(newDir === 'rtl');
        }
        if (rtlToggleBtn) rtlToggleBtn.addEventListener('click', toggleRTL);
        
        const savedDir = localStorage.getItem('botanical_dir');
        if (savedDir === 'rtl') setRTL(true);
        else setRTL(false);

        // mobile zoom prevention: inputs stay readable, no page scroll locking
        const allInputs = document.querySelectorAll('input');
        allInputs.forEach(input => {
            input.addEventListener('focus', () => { 
                input.style.fontSize = '16px'; 
            });
            input.addEventListener('blur', () => { 
                if (window.innerWidth < 640) input.style.fontSize = ''; 
            });
        });

        // ensure body can scroll normally (no scroll locking)
        document.body.style.overflow = 'auto';
        console.log("🌺 Flower & Botanical Login — ready (Facebook added, scroll free)");
    </script>
</body>
</html>
